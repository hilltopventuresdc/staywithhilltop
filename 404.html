<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Hilltop Ventures</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500&family=Jost:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: #FAF8F5; color: #2C2C2A; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px; }
    .wrap { max-width: 480px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 80px; color: #B8962E; margin-bottom: 8px; }
    h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: #2C2C2A; margin-bottom: 16px; }
    p { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 32px; }
    a { display: inline-block; background: #2C2C2A; color: #fff; font-size: 13px; letter-spacing: 0.08em; padding: 14px 28px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">BACK TO HOME →</a>
  </div>
</body>
</html>
